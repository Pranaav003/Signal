# Render Blueprint — https://render.com/docs/blueprint-spec
# Key Value (Redis-compatible) must be a `services` entry with `type: keyvalue`, not a root `redis:` block.

services:
  - type: keyvalue
    name: signal-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: public (narrow for production if needed)

  - type: web
    name: signal-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: signal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: signal-redis
          type: keyvalue
          property: connectionString
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        value: Signal/1.0
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Workers cannot use the `free` instance type on Render (use starter+).
  - type: worker
    name: signal-worker
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/jobs/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: signal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: signal-redis
          type: keyvalue
          property: connectionString
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        value: Signal/1.0
      - key: OPENAI_API_KEY
        sync: false

  # Static sites are `type: web` + `runtime: static`; many workspaces no longer offer `plan: free` for web.
  - type: web
    name: signal-frontend
    runtime: static
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Web services expose public URL via RENDER_EXTERNAL_URL (not a fromService `property`).
      - key: VITE_API_URL
        fromService:
          name: signal-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: signal-db
    plan: free
